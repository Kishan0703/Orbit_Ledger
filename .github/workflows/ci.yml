name: CI — Orbit Ledger

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Frontend (Node / Vite) ──────────────────────────────────────────
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build local treasury package
        working-directory: src/soroban/treasury
        run: |
          npm install
          npm run build

      - name: Build (Vite production bundle)
        run: npm run build

  # ── Job 2: Rust Smart Contracts ────────────────────────────────────────────
  contracts:
    name: Rust Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Treasury contract tests
        working-directory: contracts/treasury/src
        run: cargo test --release

      - name: Run SPAY Token contract tests
        working-directory: contracts/spay_token/src
        run: cargo test --release
